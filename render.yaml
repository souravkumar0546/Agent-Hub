# render.yaml — Render Blueprint for Syngene AI Hub
# Provisions three resources in one shot:
#   1. Managed Postgres  (syngene-hub-db)
#   2. FastAPI backend   (syngene-hub-api)
#   3. Vite static site  (syngene-hub)         <- entry-point for users
#
# First-deploy usage:
#   1. Push this repo to GitHub (see DEPLOY.md).
#   2. Render dashboard → New → Blueprint → connect the repo → Apply.
#   3. Fill the `sync: false` env vars (Azure OpenAI creds, bootstrap
#      super-admin password) via the backend service's Environment tab.
#   4. Wait ~5 minutes for DB provisioning + migration + first deploy.
#   5. Open the frontend service's URL and sign in.
#
# Subsequent deploys are automatic on `git push` to the linked branch.

databases:
  - name: syngene-hub-db
    plan: starter
    databaseName: syngene_hub
    user: syngene_hub
    # Starter plan includes daily backups with 7-day retention. Bump to
    # `standard` for point-in-time recovery when you have real customers.

services:
  # ───────────────────────────────────────────────────────────────────
  # Backend: FastAPI on uvicorn
  # ───────────────────────────────────────────────────────────────────
  - type: web
    name: syngene-hub-api
    runtime: python
    plan: starter
    rootDir: backend

    buildCommand: pip install -r requirements.txt

    # Alembic migrates before the service accepts traffic on every
    # deploy. Idempotent; new migrations only advance the head forward.
    preDeployCommand: alembic upgrade head

    # No --reload in prod. Two workers is the practical floor for the
    # demo — RCA runs are synchronous and hold a worker for 60-120 s
    # per turn (see audit C10). Bump `--workers` or move RCA runs to a
    # background queue before any real load.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 10

    healthCheckPath: /api/health

    envVars:
      # ── Injected from the linked database ─────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: syngene-hub-db
          property: connectionString

      # ── Secrets Render generates once (strong random) ────────────
      - key: JWT_SECRET
        generateValue: true
      - key: INTEGRATIONS_SECRET_KEY
        generateValue: true

      # ── You MUST paste these via the Render dashboard ───────────
      # `sync: false` tells Render not to sync the value from this
      # file — it exists only in the dashboard. Keeps secrets out of git.
      - key: BOOTSTRAP_SUPER_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_SUPER_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_SUPER_ADMIN_NAME
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_MODEL
        sync: false

      # ── Safe non-secret defaults ─────────────────────────────────
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-01-01-preview
      - key: DEFAULT_MODEL
        value: azure-gpt5.3
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRES_MINUTES
        value: "1440"

      # ── CORS: the public frontend URL ────────────────────────────
      # With the `/api/*` rewrite below, browsers request everything on
      # the frontend origin (no cross-origin from their view), so CORS
      # rarely actually trips. This entry is belt-and-braces for the
      # edge cases where Render forwards the original Origin header.
      # If you rename the frontend service, update this value.
      - key: CORS_ORIGINS
        value: https://syngene-hub.onrender.com

  # ───────────────────────────────────────────────────────────────────
  # Frontend: Vite static build behind Render's CDN
  # ───────────────────────────────────────────────────────────────────
  - type: web
    name: syngene-hub
    runtime: static
    rootDir: frontend

    # Note: `npm install` (not `ci`) because the repo doesn't commit a
    # package-lock.json today. Once a lockfile lands, switch to `npm ci`
    # for faster + reproducible installs.
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    routes:
      # API reverse-proxy: the browser calls relative `/api/*` URLs
      # (frontend/src/lib/api.js:42), and Render's edge forwards them
      # to the backend service. This keeps everything same-origin from
      # the browser's perspective, so no CORS preflight dance.
      #
      # Rename-safety: if you change the backend service name you must
      # update this destination too.
      - type: rewrite
        source: /api/*
        destination: https://syngene-hub-api.onrender.com/api/:splat

      # SPA fallback: any non-asset path renders index.html so React
      # Router can resolve the route client-side (e.g. /invite/:token,
      # /agents/rca_investigation, /platform/agents).
      - type: rewrite
        source: /*
        destination: /index.html
