# render.yaml — Render Blueprint for Uniqus AI Hub
# Provisions three resources in one shot:
#   1. Managed Postgres  (uniqus-hub-db)
#   2. FastAPI backend   (uniqus-hub-api)
#   3. Vite static site  (uniqus-hub)         <- entry-point for users
#
# First-deploy usage:
#   1. Push this repo to GitHub (see DEPLOY.md).
#   2. Render dashboard → New → Blueprint → connect the repo → Apply.
#   3. Fill the `sync: false` env vars (Azure OpenAI creds, bootstrap
#      super-admin password) via the backend service's Environment tab.
#   4. Wait ~5 minutes for DB provisioning + migration + first deploy.
#   5. Open the frontend service's URL and sign in.
#
# Subsequent deploys are automatic on `git push` to the linked branch.

# NOTE: no `databases:` section here by design. We use an EXTERNAL Postgres
# (Neon free tier — see DEPLOY.md step 2b) so this Blueprint can apply on
# Render's free tier without a card on file. Swap to Render's managed
# Postgres when you're ready to put a card down (add a `databases:` block
# with plan `starter`, and change the `DATABASE_URL` envVar below to
# `fromDatabase`).

services:
  # ───────────────────────────────────────────────────────────────────
  # Backend: FastAPI on uvicorn
  # ───────────────────────────────────────────────────────────────────
  - type: web
    name: uniqus-hub-api
    runtime: python
    # `free` tier: 512 MB RAM, cold-starts after 15 min idle. Fine for a
    # demo / pilot. Bump to `starter` before any real traffic.
    plan: free
    rootDir: backend

    buildCommand: pip install -r requirements.txt

    # Free tier doesn't allow `preDeployCommand`, so the migration runs
    # inline right before uvicorn starts. `alembic upgrade head` is
    # idempotent — no-op when the schema is already at head, so the
    # cold-start cost is ~50 ms in steady state. The FastAPI lifespan
    # (main.py:45) will still refuse to boot if the alembic_version
    # table is missing, so this ordering is load-bearing.
    #
    # --workers 1: the free tier caps at 512 MB RAM. Two workers each
    # carrying a SQLAlchemy pool + the RCA engine's context will OOM
    # under load. When you upgrade to `plan: starter` (2 GB RAM) bump
    # this to --workers 2. Queue-backed RCA runs are the real fix
    # (audit item C10) before any production traffic.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 10

    healthCheckPath: /api/health

    envVars:
      # ── External Postgres (Neon) connection string ───────────────
      # Paste the pooled `postgresql://…` URL from Neon's Connection
      # Details panel. Use the pooled form (ends in `-pooler.`) — the
      # free Neon tier shares connections, so the pooler is required.
      # `sync: false` keeps the secret out of the repo.
      - key: DATABASE_URL
        sync: false

      # ── Secrets Render generates once (strong random) ────────────
      - key: JWT_SECRET
        generateValue: true
      - key: INTEGRATIONS_SECRET_KEY
        generateValue: true

      # ── You MUST paste these via the Render dashboard ───────────
      # `sync: false` tells Render not to sync the value from this
      # file — it exists only in the dashboard. Keeps secrets out of git.
      - key: BOOTSTRAP_SUPER_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_SUPER_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_SUPER_ADMIN_NAME
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_MODEL
        sync: false

      # ── Safe non-secret defaults ─────────────────────────────────
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-01-01-preview
      - key: DEFAULT_MODEL
        value: azure-gpt5.3
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRES_MINUTES
        value: "1440"

      # ── CORS: the public frontend URL ────────────────────────────
      # With the `/api/*` rewrite below, browsers request everything on
      # the frontend origin (no cross-origin from their view), so CORS
      # rarely actually trips. This entry is belt-and-braces for the
      # edge cases where Render forwards the original Origin header.
      # If you rename the frontend service, update this value.
      - key: CORS_ORIGINS
        value: https://uniqus-hub.onrender.com

  # ───────────────────────────────────────────────────────────────────
  # Frontend: Vite static build behind Render's CDN
  # ───────────────────────────────────────────────────────────────────
  - type: web
    name: uniqus-hub
    runtime: static
    rootDir: frontend

    # Note: `npm install` (not `ci`) because the repo doesn't commit a
    # package-lock.json today. Once a lockfile lands, switch to `npm ci`
    # for faster + reproducible installs.
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    routes:
      # API reverse-proxy: the browser calls relative `/api/*` URLs
      # (frontend/src/lib/api.js:42), and Render's edge forwards them
      # to the backend service. This keeps everything same-origin from
      # the browser's perspective, so no CORS preflight dance.
      #
      # Rename-safety: if you change the backend service name you must
      # update this destination too.
      - type: rewrite
        source: /api/*
        destination: https://uniqus-hub-api.onrender.com/api/:splat

      # SPA fallback: any non-asset path renders index.html so React
      # Router can resolve the route client-side (e.g. /invite/:token,
      # /agents/rca_investigation, /platform/agents).
      - type: rewrite
        source: /*
        destination: /index.html
