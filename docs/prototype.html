<title>Syngene AI Hub · Prototype</title>

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body { height:100%; background:#0B0E0C; font-family: 'Inter Tight', -apple-system, sans-serif; overflow:hidden;}
  body { display:flex; flex-direction:column;}

  .proto-bar {
    height: 42px; background: #111513; border-bottom: 1px solid #222926;
    display: flex; align-items: center; padding: 0 14px; gap: 14px;
    flex-shrink: 0; position: relative; z-index: 10;
  }
  .proto-logo {
    font-family: 'Fraunces', serif; font-size: 15px; font-weight: 400;
    color: #ECEFE9; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 8px;
  }
  .proto-logo em { font-style: italic; color: #C8F263; }
  .proto-logo .dot {
    width: 6px; height: 6px; background: #C8F263; border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(200,242,99,0.15);
  }
  .proto-sep { width:1px; height:18px; background:#222926;}
  .proto-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; color: #5B645E;
  }
  .proto-pages {
    display:flex; gap:2px; margin-left:6px; flex:1;
    overflow-x: auto; scrollbar-width: none;
  }
  .proto-pages::-webkit-scrollbar { display: none; }
  .proto-pages button {
    background: transparent; border: 1px solid transparent;
    color: #9AA39D; padding: 5px 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px; white-space: nowrap;
  }
  .proto-pages button:hover { color: #ECEFE9; background: #151A17; }
  .proto-pages button.on { background: #C8F263; color: #0B0E0C; border-color: #C8F263; }
  .proto-actions { display:flex; gap:6px; align-items:center;}
  .proto-actions button {
    background: transparent; border: 1px solid #2E3632; color: #9AA39D;
    padding: 5px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px;
  }
  .proto-actions button:hover { color: #ECEFE9; border-color: #C8F263;}

  .frame-wrap { flex: 1; position: relative; min-height: 0; background:#0B0E0C; }
  iframe.page {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; background: #0B0E0C; display: none;
  }
  iframe.page.on { display: block; }

  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: #5B645E; letter-spacing: 0.12em; text-transform: uppercase;
    pointer-events: none; background:#0B0E0C;
    z-index:1; opacity:0; transition: opacity .2s;
  }
  .loading.on { opacity: 1; }
  .loading::before {
    content: ''; width: 8px; height: 8px; background: #C8F263;
    border-radius: 50%; margin-right: 10px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 0.3 } 50% { opacity: 1 } }

  .kb-hint {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: #5B645E; letter-spacing: 0.12em; text-transform: uppercase;
    margin-right:4px;
  }
  .kb-hint kbd {
    background:#1A1F1C; border:1px solid #2E3632;
    padding:1px 5px; border-radius:3px;
    color:#9AA39D; font-family:inherit; font-size:9px;
  }
</style>
</head>
<body>

  <div class="proto-actions">
    <button onclick="reloadCurrent()">↻ Reload</button>
  </div>
</div>

<div class="frame-wrap">
  <div class="loading on" id="loading">Loading</div>
</div>

<style>/* ============================================================
   SYNGNE · Shared Design System
   ============================================================ */
:root {
  --bg: #0B0E0C;
  --bg-elev: #111513;
  --bg-card: #151A17;
  --bg-card-hover: #181E1A;
  --border: #222926;
  --border-strong: #2E3632;
  --ink: #ECEFE9;
  --ink-dim: #9AA39D;
  --ink-muted: #5B645E;
  --accent: #C8F263;
  --accent-soft: #8AA04A;
  --accent-deep: #5C6E2D;
  --warn: #F2A76B;
  --bio: #6BB3F2;
  --pink: #F2B8D4;
  --err: #F27B7B;
  --radius: 4px;
  --radius-lg: 8px;
  --serif: 'Fraunces', serif;
  --sans: 'Inter Tight', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

a { color: inherit; text-decoration: none; }

.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

/* ============ SIDEBAR ============ */
.sidebar {
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  padding: 24px 18px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; padding: 0 6px; }
.logo-mark { width: 28px; height: 28px; }
.logo-mark svg { width: 100%; height: 100%; }
.logo-text {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.02em;
}
.logo-text em { font-style: italic; color: var(--accent); }

.nav-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-muted);
  padding: 16px 10px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 10px;
  border-radius: var(--radius);
  font-size: 13.5px;
  color: var(--ink-dim);
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-card); color: var(--ink); }
.nav-item.active { background: var(--bg-card); color: var(--ink); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -18px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 18px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.nav-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.nav-item .badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  background: var(--border);
  padding: 2px 6px;
  border-radius: 20px;
  color: var(--ink-dim);
}
.nav-item.active .badge { background: var(--accent); color: var(--bg); }

.sidebar-footer {
  margin-top: auto;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(200, 242, 99, 0.04) 100%);
}
.sidebar-footer h4 { font-family: var(--serif); font-weight: 500; font-size: 15px; margin-bottom: 4px; }
.sidebar-footer p { font-size: 12px; color: var(--ink-dim); margin-bottom: 10px; line-height: 1.4; }
.sidebar-footer button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  border-radius: var(--radius);
  cursor: pointer;
  text-transform: uppercase;
}

/* ============ TOP BAR ============ */
.main { padding: 0; min-width: 0; }

.topbar {
  height: 60px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 36px;
  gap: 20px;
  position: sticky;
  top: 0;
  background: rgba(11, 14, 12, 0.85);
  backdrop-filter: blur(12px);
  z-index: 50;
}
.breadcrumb {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.breadcrumb span.current { color: var(--ink); }
.breadcrumb .sep { opacity: 0.4; }
.top-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
}
.search { position: relative; width: 280px; }
.search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 8px 12px 8px 34px;
  font-family: var(--sans);
  font-size: 13px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.2s;
}
.search input:focus { border-color: var(--accent-deep); }
.search input::placeholder { color: var(--ink-muted); }
.search svg {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  stroke: var(--ink-muted);
  fill: none;
  stroke-width: 1.5;
}
.kbd {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-muted);
  border: 1px solid var(--border-strong);
  padding: 1px 5px;
  border-radius: 3px;
}
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-soft), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-style: italic;
  color: var(--bg);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.icon-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  background: transparent;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-dim);
  cursor: pointer;
  position: relative;
}
.icon-btn:hover { color: var(--ink); border-color: var(--border-strong); }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.icon-btn .dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  border: 1.5px solid var(--bg-elev);
}

/* ============ COMMON BUTTONS ============ */
.btn {
  padding: 9px 14px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: transparent;
  color: var(--ink);
  white-space: nowrap;
}
.btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { background: #D4F67A; }
.btn-secondary { background: var(--bg-elev); border-color: var(--border-strong); color: var(--ink); }
.btn-secondary:hover { background: var(--border); }
.btn-ghost {
  border-color: var(--border-strong);
  color: var(--ink-dim);
  padding: 9px 12px;
}
.btn-ghost:hover { color: var(--ink); border-color: var(--ink-muted); }

/* ============ TOAST ============ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}
.toast {
  background: var(--bg-card);
  border: 1px solid var(--accent-deep);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  min-width: 320px;
  max-width: 420px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  pointer-events: auto;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  animation: toastIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
.toast.leaving { animation: toastOut 0.25s forwards; }
@keyframes toastIn {
  from { transform: translateX(20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes toastOut {
  to { transform: translateX(20px); opacity: 0; }
}
.toast-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(200,242,99,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.toast-icon svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 2; }
.toast-body { flex: 1; }
.toast-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 2px;
}
.toast-msg {
  font-size: 12px;
  color: var(--ink-dim);
  line-height: 1.45;
}
.toast-close {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 2px;
  font-size: 16px;
  line-height: 1;
}

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  z-index: 900;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 720px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: modalIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
@keyframes modalIn {
  from { transform: translateY(20px) scale(0.98); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}
.modal-header h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 24px;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.modal-header h2 em { font-style: italic; color: var(--accent); }
.modal-header p { color: var(--ink-dim); font-size: 13px; }
.modal-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink-dim);
  width: 32px; height: 32px;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.modal-close:hover { color: var(--ink); border-color: var(--border-strong); }
.modal-body { padding: 24px 28px; }
.modal-footer {
  padding: 18px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  background: var(--bg-elev);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

/* Stepper */
.stepper {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
}
.step-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-muted);
}
.step-dot.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.step-dot.done { background: var(--accent-deep); color: var(--accent); border-color: var(--accent-deep); }
.step-line { width: 20px; height: 1px; background: var(--border-strong); }

/* Form */
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  margin-bottom: 8px;
}
.form-input, .form-select {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 14px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent-deep); }
.form-input::placeholder { color: var(--ink-muted); }
.form-help {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 6px;
  font-family: var(--mono);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.auth-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.auth-option {
  border: 1px solid var(--border);
  background: var(--bg-elev);
  padding: 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.auth-option:hover { border-color: var(--border-strong); }
.auth-option.selected {
  border-color: var(--accent);
  background: rgba(200,242,99,0.04);
}
.auth-option h5 {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 3px;
}
.auth-option p {
  font-size: 11px;
  color: var(--ink-dim);
}

/* Connection test */
.test-log {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  color: var(--ink-dim);
  max-height: 220px;
  overflow-y: auto;
}
.test-log .line { opacity: 0; animation: logIn 0.3s forwards; }
.test-log .line.ok { color: var(--accent); }
.test-log .line.info { color: var(--bio); }
@keyframes logIn { to { opacity: 1; } }

/* Responsive */
@media (max-width: 1100px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .topbar { padding: 0 20px; }
  .search { display: none; }
}

/* ============ TWEAKS PANEL ============ */
.tweaks-panel {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  width: 280px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 14px 16px 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  font-size: 12px;
}
.tp-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--border-strong);
  margin-bottom: 10px;
}
.tp-close {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  cursor: pointer;
  font-size: 16px;
}
.tp-row { margin-bottom: 10px; }
.tp-label {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.tp-swatches { display: flex; gap: 6px; }
.tp-sw {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  cursor: pointer;

// Toast system
function showToast(title, msg, opts = {}) {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      <div class="toast-msg">${msg}</div>
    </div>
    <button class="toast-close" aria-label="Close">×</button>
  `;
  container.appendChild(toast);
  const close = () => {
    toast.classList.add('leaving');

function applyTweaks(t) {
  const root = document.documentElement;

}

  p.querySelectorAll('[data-density]').forEach(el => el.onclick = () => setTweak('density', el.dataset.density));
  p.querySelectorAll('input[type=checkbox]').forEach(el => el.onchange = () => setTweak(el.dataset.key, el.checked));

function hideTweaksPanel() {

}
function setTweak(k, v) {
  window.__tweaks[k] = v;

// ============================================================
function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

// Toast system
function showToast(title, msg, opts = {}) {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="toast-body">

    </div>
    <button class="toast-close" aria-label="Close">×</button>
  `;
  container.appendChild(toast);
  const close = () => {
    toast.classList.add('leaving');

  };
  toast.querySelector('.toast-close').addEventListener('click', close);

}

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "normal",

  "showDemoBanner": true,
  "liveActivity": true

const ACCENTS = {

};

function applyTweaks(t) {
  const root = document.documentElement;
  const acc = ACCENTS[t.accent] || ACCENTS.lime;
  root.style.setProperty('--accent', acc.a);
  root.style.setProperty('--accent-soft', acc.soft);

  document.body.dataset.density = t.density;
  document.body.dataset.live = t.liveActivity ? '1' : '0';

  if (banner) banner.style.display = t.showDemoBanner ? '' : 'none';
}

function initTweaks() {
  const saved = JSON.parse(localStorage.getItem('syn-tweaks') || 'null') || TWEAKS_DEFAULTS;

  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;

      <button class="tp-close" aria-label="Close">×</button>
    </div>

        ${Object.keys(ACCENTS).map(k => `<button class="tp-sw ${t.accent===k?'on':''}" data-accent="${k}" style="background:${ACCENTS[k].a}" title="${k}"></button>`).join('')}

    </div>
    <div class="tp-row">
      <div class="tp-label">Density</div>
      <div class="tp-seg">
        ${['compact','normal','roomy'].map(d => `<button class="tp-seg-b ${t.density===d?'on':''}" data-density="${d}">${d}</button>`).join('')}
      </div>
    </div>
    <div class="tp-row">

    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="showDemoBanner" ${t.showDemoBanner?'checked':''}><span>Show prototype banner</span></label>
    </div>
  `;
  document.body.appendChild(p);

  p.querySelector('.tp-close').onclick = () => p.remove();
  p.querySelectorAll('[data-accent]').forEach(el => el.onclick = () => setTweak('accent', el.dataset.accent));
  p.querySelectorAll('[data-density]').forEach(el => el.onclick = () => setTweak('density', el.dataset.density));
  p.querySelectorAll('input[type=checkbox]').forEach(el => el.onchange = () => setTweak(el.dataset.key, el.checked));
}
function hideTweaksPanel() {
  const p = document.getElementById('tweaksPanel'); if (p) p.remove();
}
function setTweak(k, v) {
  window.__tweaks[k] = v;
  localStorage.setItem('syn-tweaks', JSON.stringify(window.__tweaks));
  applyTweaks(window.__tweaks);
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch (e) {}
  // refresh panel to reflect selection

}

function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "normal",
  "accent": "lime",
  "showDemoBanner": true,
  "liveActivity": true
}/*EDITMODE-END*/;

const ACCENTS = {

  amber:   { a: '#F2C94C', soft: '#C49A2A', deep: '#7A5E0F' },
  cyan:    { a: '#6BE6F2', soft: '#3FA6B2', deep: '#1D5962' },

};

function applyTweaks(t) {
  const root = document.documentElement;
  const acc = ACCENTS[t.accent] || ACCENTS.lime;
  root.style.setProperty('--accent', acc.a);
  root.style.setProperty('--accent-soft', acc.soft);
  root.style.setProperty('--accent-deep', acc.deep);
  document.body.dataset.density = t.density;
  document.body.dataset.live = t.liveActivity ? '1' : '0';
  const banner = document.getElementById('demoBanner');
  if (banner) banner.style.display = t.showDemoBanner ? '' : 'none';
}

function initTweaks() {
  const saved = JSON.parse(localStorage.getItem('syn-tweaks') || 'null') || TWEAKS_DEFAULTS;
  window.__tweaks = { ...TWEAKS_DEFAULTS, ...saved };
  applyTweaks(window.__tweaks);

  // Listen for host activation
  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === '__activate_edit_mode') showTweaksPanel();
    if (e.data.type === '__deactivate_edit_mode') hideTweaksPanel();
  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
}

function showTweaksPanel() {

  p.className = 'tweaks-panel';
  const t = window.__tweaks;
  p.innerHTML = `
    <div class="tp-head">
      <span>Tweaks</span>
      <button class="tp-close" aria-label="Close">×</button>
    </div>
    <div class="tp-row">
      <div class="tp-label">Accent</div>
      <div class="tp-swatches">
        ${Object.keys(ACCENTS).map(k => `<button class="tp-sw ${t.accent===k?'on':''}" data-accent="${k}" style="background:${ACCENTS[k].a}" title="${k}"></button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <div class="tp-label">Density</div>
      <div class="tp-seg">
        ${['compact','normal','roomy'].map(d => `<button class="tp-seg-b ${t.density===d?'on':''}" data-density="${d}">${d}</button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="liveActivity" ${t.liveActivity?'checked':''}><span>Live activity ticks</span></label>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="showDemoBanner" ${t.showDemoBanner?'checked':''}><span>Show prototype banner</span></label>
    </div>
  `;
  document.body.appendChild(p);

  p.querySelector('.tp-close').onclick = () => p.remove();
  p.querySelectorAll('[data-accent]').forEach(el => el.onclick = () => setTweak('accent', el.dataset.accent));
  p.querySelectorAll('[data-density]').forEach(el => el.onclick = () => setTweak('density', el.dataset.density));
  p.querySelectorAll('input[type=checkbox]').forEach(el => el.onchange = () => setTweak(el.dataset.key, el.checked));
}
function hideTweaksPanel() {
  const p = document.getElementById('tweaksPanel'); if (p) p.remove();
}
function setTweak(k, v) {
  window.__tweaks[k] = v;
  localStorage.setItem('syn-tweaks', JSON.stringify(window.__tweaks));
  applyTweaks(window.__tweaks);
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch (e) {}
  // refresh panel to reflect selection
  const p = document.getElementById('tweaksPanel');
  if (p) { p.remove(); showTweaksPanel(); }
}

function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

function showToast(title, msg, opts = {}) {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>

    </div>
    <button class="toast-close" aria-label="Close">×</button>
  `;
  container.appendChild(toast);
  const close = () => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 250);
  };

function applyTweaks(t) {
  const root = document.documentElement;
  const acc = ACCENTS[t.accent] || ACCENTS.lime;

  document.body.dataset.live = t.liveActivity ? '1' : '0';

}

  p.querySelectorAll('[data-density]').forEach(el => el.onclick = () => setTweak('density', el.dataset.density));
  p.querySelectorAll('input[type=checkbox]').forEach(el => el.onchange = () => setTweak(el.dataset.key, el.checked));

function hideTweaksPanel() {

}
function setTweak(k, v) {
  window.__tweaks[k] = v;
  localStorage.setItem('syn-tweaks', JSON.stringify(window.__tweaks));
  applyTweaks(window.__tweaks);

// ============================================================
function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

// TWEAKS — in-design variation controls
// ============================================================
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "normal",
  "accent": "lime",
  "showDemoBanner": true,
  "liveActivity": true
}/*EDITMODE-END*/;

const ACCENTS = {
  lime:    { a: '#C8F263', soft: '#8AA04A', deep: '#5C6E2D' },
  amber:   { a: '#F2C94C', soft: '#C49A2A', deep: '#7A5E0F' },
  cyan:    { a: '#6BE6F2', soft: '#3FA6B2', deep: '#1D5962' },
  magenta: { a: '#F26BB3', soft: '#B2407D', deep: '#6A1F4A' },
};

function applyTweaks(t) {
  const root = document.documentElement;
  const acc = ACCENTS[t.accent] || ACCENTS.lime;
  root.style.setProperty('--accent', acc.a);
  root.style.setProperty('--accent-soft', acc.soft);
  root.style.setProperty('--accent-deep', acc.deep);
  document.body.dataset.density = t.density;
  document.body.dataset.live = t.liveActivity ? '1' : '0';
  const banner = document.getElementById('demoBanner');
  if (banner) banner.style.display = t.showDemoBanner ? '' : 'none';
}

function initTweaks() {
  const saved = JSON.parse(localStorage.getItem('syn-tweaks') || 'null') || TWEAKS_DEFAULTS;
  window.__tweaks = { ...TWEAKS_DEFAULTS, ...saved };
  applyTweaks(window.__tweaks);

  // Listen for host activation
  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === '__activate_edit_mode') showTweaksPanel();
    if (e.data.type === '__deactivate_edit_mode') hideTweaksPanel();
  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
}

function showTweaksPanel() {
  if (document.getElementById('tweaksPanel')) return;
  const p = document.createElement('div');
  p.id = 'tweaksPanel';
  p.className = 'tweaks-panel';
  const t = window.__tweaks;
  p.innerHTML = `
    <div class="tp-head">
      <span>Tweaks</span>
      <button class="tp-close" aria-label="Close">×</button>
    </div>
    <div class="tp-row">
      <div class="tp-label">Accent</div>
      <div class="tp-swatches">
        ${Object.keys(ACCENTS).map(k => `<button class="tp-sw ${t.accent===k?'on':''}" data-accent="${k}" style="background:${ACCENTS[k].a}" title="${k}"></button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <div class="tp-label">Density</div>
      <div class="tp-seg">
        ${['compact','normal','roomy'].map(d => `<button class="tp-seg-b ${t.density===d?'on':''}" data-density="${d}">${d}</button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="liveActivity" ${t.liveActivity?'checked':''}><span>Live activity ticks</span></label>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="showDemoBanner" ${t.showDemoBanner?'checked':''}><span>Show prototype banner</span></label>
    </div>
  `;
  document.body.appendChild(p);

  p.querySelector('.tp-close').onclick = () => p.remove();
  p.querySelectorAll('[data-accent]').forEach(el => el.onclick = () => setTweak('accent', el.dataset.accent));
  p.querySelectorAll('[data-density]').forEach(el => el.onclick = () => setTweak('density', el.dataset.density));
  p.querySelectorAll('input[type=checkbox]').forEach(el => el.onchange = () => setTweak(el.dataset.key, el.checked));
}
function hideTweaksPanel() {
  const p = document.getElementById('tweaksPanel'); if (p) p.remove();
}
function setTweak(k, v) {
  window.__tweaks[k] = v;
  localStorage.setItem('syn-tweaks', JSON.stringify(window.__tweaks));
  applyTweaks(window.__tweaks);
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch (e) {}
  // refresh panel to reflect selection
  const p = document.getElementById('tweaksPanel');
  if (p) { p.remove(); showTweaksPanel(); }
}

// Initialize on every page load
document.addEventListener('DOMContentLoaded', initTweaks);

function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "normal",
  "accent": "lime",
  "showDemoBanner": true,
  "liveActivity": true
}/*EDITMODE-END*/;

const ACCENTS = {

  amber:   { a: '#F2C94C', soft: '#C49A2A', deep: '#7A5E0F' },
  cyan:    { a: '#6BE6F2', soft: '#3FA6B2', deep: '#1D5962' },

};

function applyTweaks(t) {
  const root = document.documentElement;
  const acc = ACCENTS[t.accent] || ACCENTS.lime;
  root.style.setProperty('--accent', acc.a);
  root.style.setProperty('--accent-soft', acc.soft);
  root.style.setProperty('--accent-deep', acc.deep);
  document.body.dataset.density = t.density;
  document.body.dataset.live = t.liveActivity ? '1' : '0';
  const banner = document.getElementById('demoBanner');
  if (banner) banner.style.display = t.showDemoBanner ? '' : 'none';
}

function initTweaks() {
  const saved = JSON.parse(localStorage.getItem('syn-tweaks') || 'null') || TWEAKS_DEFAULTS;
  window.__tweaks = { ...TWEAKS_DEFAULTS, ...saved };
  applyTweaks(window.__tweaks);

  // Listen for host activation
  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === '__activate_edit_mode') showTweaksPanel();

  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
}

function showTweaksPanel() {

  p.className = 'tweaks-panel';
  const t = window.__tweaks;
  p.innerHTML = `
    <div class="tp-head">
      <span>Tweaks</span>
      <button class="tp-close" aria-label="Close">×</button>
    </div>
    <div class="tp-row">
      <div class="tp-label">Accent</div>
      <div class="tp-swatches">
        ${Object.keys(ACCENTS).map(k => `<button class="tp-sw ${t.accent===k?'on':''}" data-accent="${k}" style="background:${ACCENTS[k].a}" title="${k}"></button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <div class="tp-label">Density</div>
      <div class="tp-seg">
        ${['compact','normal','roomy'].map(d => `<button class="tp-seg-b ${t.density===d?'on':''}" data-density="${d}">${d}</button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="liveActivity" ${t.liveActivity?'checked':''}><span>Live activity ticks</span></label>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="showDemoBanner" ${t.showDemoBanner?'checked':''}><span>Show prototype banner</span></label>
    </div>
  `;
  document.body.appendChild(p);

  p.querySelector('.tp-close').onclick = () => p.remove();
  p.querySelectorAll('[data-accent]').forEach(el => el.onclick = () => setTweak('accent', el.dataset.accent));
  p.querySelectorAll('[data-density]').forEach(el => el.onclick = () => setTweak('density', el.dataset.density));
  p.querySelectorAll('input[type=checkbox]').forEach(el => el.onchange = () => setTweak(el.dataset.key, el.checked));
}
function hideTweaksPanel() {
  const p = document.getElementById('tweaksPanel'); if (p) p.remove();
}
function setTweak(k, v) {
  window.__tweaks[k] = v;
  localStorage.setItem('syn-tweaks', JSON.stringify(window.__tweaks));
  applyTweaks(window.__tweaks);
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch (e) {}
  // refresh panel to reflect selection
  const p = document.getElementById('tweaksPanel');
  if (p) { p.remove(); showTweaksPanel(); }
}

function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; padding: 0 6px; }
.logo-mark { width: 28px; height: 28px; }
.logo-mark svg { width: 100%; height: 100%; }
.logo-text {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.02em;
}
.logo-text em { font-style: italic; color: var(--accent); }

.nav-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-muted);
  padding: 16px 10px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 10px;
  border-radius: var(--radius);
  font-size: 13.5px;
  color: var(--ink-dim);
  cursor: pointer;
  transition: all 0.15s ease;
  text-decoration: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-card); color: var(--ink); }
.nav-item.active { background: var(--bg-card); color: var(--ink); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -18px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 18px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.nav-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.nav-item .badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  background: var(--border);
  padding: 2px 6px;
  border-radius: 20px;
  color: var(--ink-dim);
}
.nav-item.active .badge { background: var(--accent); color: var(--bg); }

.sidebar-footer {
  margin-top: auto;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(200, 242, 99, 0.04) 100%);
}
.sidebar-footer h4 { font-family: var(--serif); font-weight: 500; font-size: 15px; margin-bottom: 4px; }
.sidebar-footer p { font-size: 12px; color: var(--ink-dim); margin-bottom: 10px; line-height: 1.4; }
.sidebar-footer button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  border-radius: var(--radius);
  cursor: pointer;
  text-transform: uppercase;
}

/* ============ TOP BAR ============ */
.main { padding: 0; min-width: 0; }

.topbar {
  height: 60px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 36px;
  gap: 20px;
  position: sticky;
  top: 0;
  background: rgba(11, 14, 12, 0.85);
  backdrop-filter: blur(12px);
  z-index: 50;
}
.breadcrumb {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.breadcrumb span.current { color: var(--ink); }
.breadcrumb .sep { opacity: 0.4; }
.top-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
}
.search { position: relative; width: 280px; }
.search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 8px 12px 8px 34px;
  font-family: var(--sans);
  font-size: 13px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.2s;
}
.search input:focus { border-color: var(--accent-deep); }
.search input::placeholder { color: var(--ink-muted); }
.search svg {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  stroke: var(--ink-muted);
  fill: none;
  stroke-width: 1.5;
}
.kbd {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-muted);
  border: 1px solid var(--border-strong);
  padding: 1px 5px;
  border-radius: 3px;
}
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-soft), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-style: italic;
  color: var(--bg);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.icon-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  background: transparent;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-dim);
  cursor: pointer;
  position: relative;
}
.icon-btn:hover { color: var(--ink); border-color: var(--border-strong); }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.icon-btn .dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  border: 1.5px solid var(--bg-elev);
}

/* ============ COMMON BUTTONS ============ */
.btn {
  padding: 9px 14px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: transparent;
  color: var(--ink);
  white-space: nowrap;
}
.btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { background: #D4F67A; }
.btn-secondary { background: var(--bg-elev); border-color: var(--border-strong); color: var(--ink); }
.btn-secondary:hover { background: var(--border); }
.btn-ghost {
  border-color: var(--border-strong);
  color: var(--ink-dim);
  padding: 9px 12px;
}
.btn-ghost:hover { color: var(--ink); border-color: var(--ink-muted); }

/* ============ TOAST ============ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}
.toast {
  background: var(--bg-card);
  border: 1px solid var(--accent-deep);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  min-width: 320px;
  max-width: 420px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  pointer-events: auto;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  animation: toastIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
.toast.leaving { animation: toastOut 0.25s forwards; }
@keyframes toastIn {
  from { transform: translateX(20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes toastOut {
  to { transform: translateX(20px); opacity: 0; }
}
.toast-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(200,242,99,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.toast-icon svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 2; }
.toast-body { flex: 1; }
.toast-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 2px;
}
.toast-msg {
  font-size: 12px;
  color: var(--ink-dim);
  line-height: 1.45;
}
.toast-close {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 2px;
  font-size: 16px;
  line-height: 1;
}

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  z-index: 900;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 720px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: modalIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
@keyframes modalIn {
  from { transform: translateY(20px) scale(0.98); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}
.modal-header h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 24px;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.modal-header h2 em { font-style: italic; color: var(--accent); }
.modal-header p { color: var(--ink-dim); font-size: 13px; }
.modal-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink-dim);
  width: 32px; height: 32px;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.modal-close:hover { color: var(--ink); border-color: var(--border-strong); }
.modal-body { padding: 24px 28px; }
.modal-footer {
  padding: 18px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  background: var(--bg-elev);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

/* Stepper */
.stepper {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
}
.step-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-muted);
}
.step-dot.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.step-dot.done { background: var(--accent-deep); color: var(--accent); border-color: var(--accent-deep); }
.step-line { width: 20px; height: 1px; background: var(--border-strong); }

/* Form */
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  margin-bottom: 8px;
}
.form-input, .form-select {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 14px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent-deep); }
.form-input::placeholder { color: var(--ink-muted); }
.form-help {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 6px;
  font-family: var(--mono);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.auth-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.auth-option {
  border: 1px solid var(--border);
  background: var(--bg-elev);
  padding: 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.auth-option:hover { border-color: var(--border-strong); }
.auth-option.selected {
  border-color: var(--accent);
  background: rgba(200,242,99,0.04);
}
.auth-option h5 {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 3px;
}
.auth-option p {
  font-size: 11px;
  color: var(--ink-dim);
}

/* Connection test */
.test-log {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  color: var(--ink-dim);
  max-height: 220px;
  overflow-y: auto;
}
.test-log .line { opacity: 0; animation: logIn 0.3s forwards; }
.test-log .line.ok { color: var(--accent); }
.test-log .line.info { color: var(--bio); }
@keyframes logIn { to { opacity: 1; } }

/* Responsive */
@media (max-width: 1100px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .topbar { padding: 0 20px; }
  .search { display: none; }
}

/* ============ TWEAKS PANEL ============ */
.tweaks-panel {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  width: 280px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 14px 16px 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  font-size: 12px;
}
.tp-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--border-strong);
  margin-bottom: 10px;
}
.tp-close {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  cursor: pointer;
  font-size: 16px;
}
.tp-row { margin-bottom: 10px; }
.tp-label {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 6px;
}
.tp-swatches { display: flex; gap: 6px; }
.tp-sw {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  cursor: pointer;
  padding: 0;
}
.tp-sw.on { border-color: var(--ink); box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 3px currentColor; }
.tp-seg {
  display: flex;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2px;
  gap: 2px;
}
.tp-seg-b {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--ink-dim);
  padding: 5px 8px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: 3px;
}
.tp-seg-b.on { background: var(--accent); color: var(--bg); }
.tp-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--ink);
}
.tp-toggle input { accent-color: var(--accent); }

/* Density */
body[data-density="compact"] .content,
body[data-density="compact"] .page-header,
body[data-density="compact"] .hero { padding-top: 24px; padding-bottom: 24px; }
body[data-density="roomy"] .content,
body[data-density="roomy"] .page-header,
body[data-density="roomy"] .hero { padding-top: 56px; padding-bottom: 56px; }

/* ============ SHARED PAGE HEADER (used on non-hub pages) ============ */
.page-header {
  padding: 40px 36px 32px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.page-tag {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.page-tag::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(200, 242, 99, 0.15);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(200, 242, 99, 0.15); }
  50% { box-shadow: 0 0 0 8px rgba(200, 242, 99, 0.05); }
}
.page-header h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 42px;
  line-height: 1.05;
  letter-spacing: -0.03em;
  max-width: 780px;
  margin-bottom: 12px;
}
.page-header h1 em { font-style: italic; font-weight: 400; color: var(--accent); }
.page-header p {
  font-size: 14px;
  color: var(--ink-dim);
  max-width: 620px;
  line-height: 1.55;
}
.page-stats {
  display: flex;
  gap: 36px;
  margin-top: 26px;
  padding-top: 22px;
  border-top: 1px dashed var(--border-strong);
  max-width: 900px;
  flex-wrap: wrap;
}
.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.02em;
}
.stat-value .unit {
  font-size: 12px;
  color: var(--ink-dim);
  margin-left: 2px;
  font-family: var(--sans);
}
.stat-trend {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  margin-top: 2px;
}

.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 20px;
  flex-wrap: wrap;
}
.section-header h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.02em;
}
.section-header h2 em { font-style: italic; color: var(--ink-dim); font-weight: 300; }

.content { padding: 36px 36px 80px; }

/* Shared demo banner */
.demo-banner {
  background: linear-gradient(90deg, rgba(200,242,99,0.08), transparent);
  border-bottom: 1px solid var(--accent-deep);
  padding: 8px 36px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  display: flex;
  align-items: center;
  gap: 10px;
}
.demo-banner strong { color: var(--accent); font-weight: 500; }
.demo-banner .close-banner {
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--ink-muted);
  cursor: pointer;
  font-size: 14px;
}

/* Status pills (reused) */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--border-strong);
  color: var(--ink-dim);
  background: transparent;
  white-space: nowrap;
}
.pill::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.pill.ok { color: var(--accent); border-color: var(--accent-deep); background: rgba(200,242,99,0.08); }
.pill.warn { color: var(--warn); border-color: rgba(242,167,107,0.3); background: rgba(242,167,107,0.06); }
.pill.err { color: var(--err); border-color: rgba(242,123,123,0.3); background: rgba(242,123,123,0.06); }
.pill.info { color: var(--bio); border-color: rgba(107,179,242,0.3); background: rgba(107,179,242,0.06); }
.pill.neutral { color: var(--ink-dim); }
.pill.poc { color: #A78BFA; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.06); }
.pill.nodot::before { display: none; }

/* Common card shell */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

/* Table */
.tbl {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-card);
  font-size: 13px;
}
.tbl .thead {
  display: grid;
  background: var(--bg-elev);
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}
.tbl .trow {
  display: grid;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  gap: 20px;
  transition: background 0.15s;
}
.tbl .trow:last-child { border-bottom: none; }
.tbl .trow:hover { background: var(--bg-elev); }
.mono-sm {
  font-family: var(--mono);
  font-size: 10px;

// Toast system
function showToast(title, msg, opts = {}) {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>

    </div>
    <button class="toast-close" aria-label="Close">×</button>
  `;
  container.appendChild(toast);
  const close = () => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 250);
  };
  toast.querySelector('.toast-close').addEventListener('click', close);

}

function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {

  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;

  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';

}

  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;

}

// SYNGENE · Shared prototype behaviors

// Toast system
function showToast(title, msg, opts = {}) {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      <div class="toast-msg">${msg}</div>
    </div>
    <button class="toast-close" aria-label="Close">×</button>
  `;
  container.appendChild(toast);
  const close = () => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 250);
  };
  toast.querySelector('.toast-close').addEventListener('click', close);
  setTimeout(close, opts.duration || 4200);
}

// Modal helpers
function openModal(id) {
  const m = document.getElementById(id);
  if (m) { m.classList.add('open'); document.body.style.overflow = 'hidden'; }
}
function closeModal(id) {
  const m = document.getElementById(id);
  if (m) { m.classList.remove('open'); document.body.style.overflow = ''; }
}

// Close modals on overlay click or ESC
document.addEventListener('click', (e) => {
  if (e.target.classList && e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
    document.body.style.overflow = '';
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
    document.body.style.overflow = '';
  }
});

  const tab = e.target.closest('[data-tab-group]');

    const group = tab.dataset.tabGroup;
    document.querySelectorAll(`[data-tab-group="${group}"]`).forEach(t => t.classList.remove('active'));

  }
});

// ============================================================
// TWEAKS — in-design variation controls
// ============================================================
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "normal",
  "accent": "lime",
  "showDemoBanner": true,
  "liveActivity": true
}/*EDITMODE-END*/;

const ACCENTS = {
  lime:    { a: '#C8F263', soft: '#8AA04A', deep: '#5C6E2D' },
  amber:   { a: '#F2C94C', soft: '#C49A2A', deep: '#7A5E0F' },
  cyan:    { a: '#6BE6F2', soft: '#3FA6B2', deep: '#1D5962' },
  magenta: { a: '#F26BB3', soft: '#B2407D', deep: '#6A1F4A' },
};

function applyTweaks(t) {
  const root = document.documentElement;
  const acc = ACCENTS[t.accent] || ACCENTS.lime;
  root.style.setProperty('--accent', acc.a);
  root.style.setProperty('--accent-soft', acc.soft);
  root.style.setProperty('--accent-deep', acc.deep);
  document.body.dataset.density = t.density;
  document.body.dataset.live = t.liveActivity ? '1' : '0';
  const banner = document.getElementById('demoBanner');
  if (banner) banner.style.display = t.showDemoBanner ? '' : 'none';
}

function initTweaks() {
  const saved = JSON.parse(localStorage.getItem('syn-tweaks') || 'null') || TWEAKS_DEFAULTS;
  window.__tweaks = { ...TWEAKS_DEFAULTS, ...saved };
  applyTweaks(window.__tweaks);

  // Listen for host activation
  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === '__activate_edit_mode') showTweaksPanel();
    if (e.data.type === '__deactivate_edit_mode') hideTweaksPanel();
  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
}

function showTweaksPanel() {
  if (document.getElementById('tweaksPanel')) return;
  const p = document.createElement('div');
  p.id = 'tweaksPanel';
  p.className = 'tweaks-panel';
  const t = window.__tweaks;
  p.innerHTML = `
    <div class="tp-head">
      <span>Tweaks</span>
      <button class="tp-close" aria-label="Close">×</button>
    </div>
    <div class="tp-row">
      <div class="tp-label">Accent</div>
      <div class="tp-swatches">
        ${Object.keys(ACCENTS).map(k => `<button class="tp-sw ${t.accent===k?'on':''}" data-accent="${k}" style="background:${ACCENTS[k].a}" title="${k}"></button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <div class="tp-label">Density</div>
      <div class="tp-seg">
        ${['compact','normal','roomy'].map(d => `<button class="tp-seg-b ${t.density===d?'on':''}" data-density="${d}">${d}</button>`).join('')}
      </div>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="liveActivity" ${t.liveActivity?'checked':''}><span>Live activity ticks</span></label>
    </div>
    <div class="tp-row">
      <label class="tp-toggle"><input type="checkbox" data-key="showDemoBanner" ${t.showDemoBanner?'checked':''}><span>Show prototype banner</span></label>
    </div>
  `;
  document.body.appendChild(p);

  p.querySelector('.tp-close').onclick = () => p.remove();
  p.querySelectorAll('[data-accent]').forEach(el => el.onclick = () => setTweak('accent', el.dataset.accent));
  p.querySelectorAll('[data-density]').forEach(el => el.onclick = () => setTweak('density', el.dataset.density));
  p.querySelectorAll('input[type=checkbox]').forEach(el => el.onchange = () => setTweak(el.dataset.key, el.checked));
}
function hideTweaksPanel() {
  const p = document.getElementById('tweaksPanel'); if (p) p.remove();
}
function setTweak(k, v) {
  window.__tweaks[k] = v;
  localStorage.setItem('syn-tweaks', JSON.stringify(window.__tweaks));
  applyTweaks(window.__tweaks);
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch (e) {}
  // refresh panel to reflect selection
  const p = document.getElementById('tweaksPanel');
  if (p) { p.remove(); showTweaksPanel(); }
}

// Initialize on every page load
document.addEventListener('DOMContentLoaded', initTweaks);

function sparkline(values, { color = 'var(--accent)', fill = true, width = 100, height = 28 } = {}) {
  const max = Math.max(...values), min = Math.min(...values);
  const r = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / r) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = 'M ' + pts.join(' L ');
  const area = fill ? `<path d="${path} L ${width},${height} L 0,${height} Z" fill="${color}" opacity="0.1"/>` : '';
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${area}<path d="${path}" fill="none" stroke="${color}" stroke-width="1.2"/></svg>`;
}

// Helper: relative time
function timeAgo(mins) {
  if (mins < 1) return 'just now';
  if (mins < 60) return `${Math.floor(mins)}m ago`;
  if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
  return `${Math.floor(mins/1440)}d ago`;
}

// Toast system
function showToast(title, msg, opts = {}) {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      <div class="toast-msg">${msg}</div>
    </div>
    <button class="toast-close" aria-label="Close">×</button>
  `;
  container.appendChild(toast);
  const close = () => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 250);
  };
  toast.querySelector('.toast-close').addEventListener('click', close);
  setTimeout(close, opts.duration || 4200);
}

function openModal(id) {
  const m = document.getElementById(id);
  if (m) { m.classList.add('open'); document.body.style.overflow = 'hidden'; }
}

  const m = document.getElementById(id);
  if (m) { m.classList.remove('open'); document.body.style.overflow = ''; }

  if (e.target.classList && e.target.classList.contains('modal-overlay')) {

  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
